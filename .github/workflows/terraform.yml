name: Terraform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-and-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Generate Terraform configs
        run: nix run .#generate

      - name: Upload generated configs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-configs
          path: environments/

  # Terraform Cloud will run the actual plan/apply via the TFC Agent
  # The TFC workspace should be configured to trigger on this repo's changes
